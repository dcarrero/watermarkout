<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WatermarkOut — Remove AI watermarks</title>

  <!-- SEO -->
  <meta name="description" content="Remove watermarks from AI-generated images. 100% offline, your image never leaves your browser. Free, no signup required.">
  <meta name="keywords" content="watermark remover, AI watermark, Gemini, remove watermark, image cleanup, free tool">
  <meta name="author" content="David Carrero">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://dcarrero.github.io/watermarkout/">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="WatermarkOut — Remove AI watermarks">
  <meta property="og:description" content="Free web tool to remove watermarks from AI-generated images. 100% offline — your image never leaves your browser.">
  <meta property="og:url" content="https://dcarrero.github.io/watermarkout/">
  <meta property="og:site_name" content="WatermarkOut">
  <meta property="og:image" content="https://dcarrero.github.io/watermarkout/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:locale" content="en_US">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="WatermarkOut — Remove AI watermarks">
  <meta name="twitter:description" content="100% offline. No upload. No signup. Free.">
  <meta name="twitter:image" content="https://dcarrero.github.io/watermarkout/og-image.png">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='12' fill='%230a0a0a'/%3E%3Ctext x='50' y='68' text-anchor='middle' font-size='60' fill='%23e8ff00'%3E✦%3C/text%3E%3C/svg%3E">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='20' fill='%230a0a0a'/%3E%3Ctext x='90' y='120' text-anchor='middle' font-size='100' fill='%23e8ff00'%3E✦%3C/text%3E%3C/svg%3E">

  <!-- Theme -->
  <meta name="theme-color" content="#0a0a0a">
  <meta name="color-scheme" content="dark">

  <link rel="stylesheet" href="css/app.css">
</head>
<body>

  <main class="app" data-state="idle">

    <!-- Workspace: canvas area -->
    <div class="workspace">

      <!-- Drop zone -->
      <div class="dropzone" id="dropzone" tabindex="0" role="button" data-i18n="dropTitle" data-i18n-attr="aria-label">
        <div class="dropzone-content">
          <div class="dropzone-icon">✦</div>
          <p class="dropzone-title" data-i18n="dropTitle">Drop your image here</p>
          <p class="dropzone-subtitle" data-i18n="dropSubtitle">or click to browse</p>
          <p class="dropzone-formats" data-i18n="dropFormats">PNG · JPG · WEBP</p>
        </div>
        <input type="file" id="file-input" accept="image/png,image/jpeg,image/webp,image/gif" hidden>
      </div>

      <!-- Canvas container -->
      <div class="canvas-wrap" id="canvas-wrap">
        <canvas id="canvas-main" role="img" aria-label="Loaded image"></canvas>
        <canvas id="canvas-overlay"></canvas>
        <canvas id="canvas-compare"></canvas>

        <div class="ba-slider" id="ba-slider" hidden>
          <div class="ba-handle" id="ba-handle" tabindex="0" role="slider" aria-valuemin="0" aria-valuemax="100" aria-valuenow="50"></div>
        </div>

        <div class="progress-wrap" id="progress-wrap" hidden>
          <div class="progress-bar" id="progress-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"></div>
          <span class="progress-text" id="progress-text">Removing... 0%</span>
        </div>
      </div>

      <div class="message" id="message" hidden></div>
    </div>

    <!-- Control panel -->
    <aside class="panel" id="panel">
      <h1 class="panel-brand" data-i18n="brand">WATERMARKOUT</h1>
      <p class="panel-tagline" data-i18n="tagline">100% offline · your image never leaves your browser</p>

      <!-- Language selector -->
      <div class="lang-selector">
        <label for="lang-select" class="lang-label" data-i18n="language">Language</label>
        <select id="lang-select" class="lang-select"></select>
      </div>

      <!-- File info -->
      <div class="file-info" id="file-info" hidden>
        <span class="file-name" id="file-name"></span>
        <span class="file-dims" id="file-dims"></span>
      </div>

      <hr class="divider">

      <!-- Detection controls -->
      <div class="control-group" id="controls-detect" hidden>
        <button class="btn btn--primary" id="btn-autodetect">
          <span data-i18n="btnAutodetect">✦ Auto-detect</span>
        </button>
        <button class="btn btn--secondary" id="btn-manual">
          <span data-i18n="btnManual">Manual selection</span>
        </button>
      </div>

      <div class="detect-feedback" id="detect-feedback" hidden></div>

      <!-- Action controls -->
      <div class="control-group" id="controls-action" hidden>
        <button class="btn btn--accent" id="btn-remove" disabled>
          <span data-i18n="btnRemove">Remove watermark</span>
        </button>
      </div>

      <!-- Smoothing slider -->
      <div class="control-group" id="controls-smooth" hidden>
        <label class="slider-label" for="slider-smooth">
          <span data-i18n="sliderLabel">Smoothing</span>
          <span class="slider-value" id="smooth-value">1</span>
        </label>
        <input type="range" id="slider-smooth" class="slider" min="0" max="5" value="1" step="1">
      </div>

      <!-- Result controls -->
      <div class="control-group" id="controls-result" hidden>
        <button class="btn btn--accent" id="btn-download">
          <span data-i18n="btnDownload">↓ Download PNG</span>
        </button>
        <button class="btn btn--secondary" id="btn-undo">
          <span data-i18n="btnUndo">↺ Undo</span>
        </button>
      </div>

      <div class="control-group" id="controls-new" hidden>
        <button class="btn btn--ghost" id="btn-new">
          <span data-i18n="btnNew">+ New image</span>
        </button>
      </div>

      <!-- Footer -->
      <footer class="panel-footer">
        <p class="disclaimer" data-i18n="disclaimer">For personal use. The user is responsible for the use of processed images.</p>
        <p class="credits">
          <span data-i18n="footer">Open Source project by</span>
          <a href="https://carrero.es" target="_blank" rel="noopener">David Carrero</a>
          · <span data-i18n="footerOn">Available on</span>
          <a href="https://github.com/dcarrero/watermarkout" target="_blank" rel="noopener">GitHub</a>
        </p>
      </footer>
    </aside>

  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
